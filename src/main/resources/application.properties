spring.application.name=spring_thymeleaf

# Use an embedded H2 database (file-based) so tables are created locally without external DB server
spring.datasource.url=jdbc:h2:file:./data/Aufgabe10_DC;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update schema from JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console for quick inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
