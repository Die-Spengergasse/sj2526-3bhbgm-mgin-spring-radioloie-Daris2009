# Spring profile for MySQL connection
# Usage: activate this profile when you want the app to use MySQL instead of the embedded H2.
# Either set the active profile (e.g. -Dspring.profiles.active=mysql) or pass as Spring Boot argument.

spring.datasource.url=jdbc:mysql://localhost:3306/Aufgabe10_DC?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD

# Hibernate: if you already imported the provided SQL, set to 'validate' to check mappings; otherwise use 'update' to let Hibernate create missing tables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# (Optional) H2 console not needed for MySQL, keep it disabled in this profile
spring.h2.console.enabled=false

